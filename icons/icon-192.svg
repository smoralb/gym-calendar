<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g transform="translate(96,96)">
    <!-- Bar -->
    <rect x="-48" y="-6" width="96" height="12" rx="6" fill="#e94560"/>
    <!-- Left weight -->
    <rect x="-56" y="-16" width="16" height="32" rx="4" fill="#0f3460"/>
    <rect x="-60" y="-20" width="24" height="40" rx="6" fill="none" stroke="#e94560" stroke-width="2"/>
    <!-- Right weight -->
    <rect x="40" y="-16" width="16" height="32" rx="4" fill="#0f3460"/>
    <rect x="36" y="-20" width="24" height="40" rx="6" fill="none" stroke="#e94560" stroke-width="2"/>
  </g>
</svg>
